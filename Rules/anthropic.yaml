  - +.statsigapi.net           # 功能开关 / AB 测试
  - +.browser-intake-us5-datadoghq.com

  # ── 客服 / 第三方 widget ──
  - intercom.io
  - intercomcdn.com
  - cdn.usefathom.com
  
