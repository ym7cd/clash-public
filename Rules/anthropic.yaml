  - +.claude.com               # Claude 备用域名
  - +.clau.de                  # Claude 短域名（重定向）
  - +.claudemcpclient.com      # Claude MCP 客户端通信
  - +.claudemcpcontent.com
  - +.claudeusercontent.com    # Claude 用户内容 / 附件

  # ── CDN 和基础设施 ──
  - +.cdn.anthropic.com                 # Anthropic CDN 资源
  - +.anthropic.com.cdn.cloudflare.net  # Cloudflare CDN 节点
  - +.servd-anthropic-website.b-cdn.net # BunnyCDN 静态资源

  # ── 认证与内容 ──
  - +.anthropic.auth0.com      # OAuth 登录认证
  - +.anthropic-com.ghost.io   # 博客 / CMS 内容

  # ── 监控和数据上报（防风控防 IP 泄漏） ──
